name: "evcc"

services:
  evcc:
    container_name: evcc
    image: evcc/evcc:latest
    command:
      - evcc
    ports:
      - "${PORT_EVCC_HTTP:-7070}:7070/tcp"
      - "${PORT_EVCC_OCPP:-8887}:8887/tcp"
    volumes:
      - ${CONFIG_DIR}/evcc:/root/.evcc
    environment:
      - TZ=${TZ}
    labels:
      - homepage.group=Smart Home
      - homepage.name=evcc
      - homepage.icon=evcc.svg
      - homepage.href=https://evcc.home.${DOMAIN}
      - homepage.description=EV charging control
      # AutoKuma -> central Uptime Kuma. Reached over Tailnet by the Kuma
      # container on homelab-vps.
      - kuma.evcc.http.name=evcc
      - kuma.evcc.http.url=http://docker.${TAILNET}:${PORT_EVCC_HTTP}
      - kuma.evcc.http.interval=60
    restart: unless-stopped
