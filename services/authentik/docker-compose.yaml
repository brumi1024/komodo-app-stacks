name: "authentik"

services:
  postgresql:
    container_name: authentik-postgresql
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - authentik-database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS:?database password required}
      POSTGRES_USER: ${AUTHENTIK_PG_USER:-authentik}
      POSTGRES_DB: ${AUTHENTIK_PG_DB:-authentik}
  server:
    container_name: authentik-server
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.5.4}
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
    volumes:
      - ${CONFIG_DIR}/authentik/data:/data
      - ${CONFIG_DIR}/authentik/custom-templates:/templates
    networks:
      - default
      - vps-ingress
    labels:
      - homepage.group=Administration
      - homepage.name=Authentik
      - homepage.icon=authentik.svg
      - homepage.href=https://auth.${DOMAIN}
      - homepage.description=Authentication Service
      - homepage.widget.type=authentik
      - homepage.widget.url=https://auth.${DOMAIN}
      - homepage.widget.key=${AUTHENTIK_HOMEPAGE_TOKEN}
      - kuma.authentik.http.name=Authentik
      - kuma.authentik.http.url=http://authentik-server:9000/-/health/live/
      - kuma.authentik.http.interval=60
    env_file:
      - "${KOMODO_ENV_FILE:-.env}"
    depends_on:
      postgresql:
        condition: service_healthy
  worker:
    container_name: authentik-worker
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.5.4}
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
    volumes:
      - ${CONFIG_DIR}/authentik/data:/data
      - ${CONFIG_DIR}/authentik/certs:/certs
      - ${CONFIG_DIR}/authentik/custom-templates:/templates
    env_file:
      - "${KOMODO_ENV_FILE:-.env}"
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  authentik-database:
    driver: local

networks:
  vps-ingress:
    external: true
    name: vps-ingress
