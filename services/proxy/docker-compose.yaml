name: "proxy"

services:
  socky_proxy:
    container_name: socky_proxy
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    networks:
      - socky_proxy-net
    environment:
      # Variables match the URL prefix (i.e. AUTH blocks access to /auth/* parts of the API, etc).
      #   0 - revoke access
      #   1 - grant access
      - TZ=${TZ}
      - CONTAINERS=1 # Allow access to viewing containers
      - INFO=1 # AutoKuma includes Docker host metadata while rendering labels
      - SERVICES=0
      - TASKS=0
      - POST=0 # Disallow any POST operations (effectively read-only)
    labels:
      - homepage.group=Administration
      - homepage.name=${PROXY_INSTANCE} Docker Socket Proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:2375/version || exit 1"]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "30s"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 64M
    restart: unless-stopped

networks:
  socky_proxy-net:
    name: socky_proxy-net
