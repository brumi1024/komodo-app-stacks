[[stack]]
name = "proxy-sequoia"
tags = ["docker", "security", "proxy", "socket"]

[stack.config]
server = "docker-seq"
poll_for_updates = true
auto_update = true
destroy_before_deploy = false
linked_repo = "app-stacks"
env_file_path = ".env.proxy-sequoia"
file_paths = [
    "services/proxy/docker-compose.yaml",
    "services/proxy/remote/docker-compose.yaml",
]

environment = """
PROXY_INSTANCE=sequoia
# System configuration
TZ=[[TZ]]

# Port configuration
PORT_SOCKY_PROXY=[[PORT_SOCKY_PROXY]]
"""
