name: ${AUTOKUMA_PROJECT_NAME:-autokuma}

services:
  autokuma:
    container_name: autokuma-${AUTOKUMA_INSTANCE:-home}
    image: ghcr.io/bigboot/autokuma:uptime-kuma-v1-latest
    restart: unless-stopped
    logging:
      driver: ${LOGGING_DRIVER:-local}
    environment:
      AUTOKUMA__KUMA__URL: ${KUMA_URL}
      AUTOKUMA__KUMA__USERNAME: ${KUMA_USERNAME}
      AUTOKUMA__KUMA__PASSWORD: ${KUMA_PASSWORD}
      # Per-instance tag — must be unique across nodes so each AutoKuma
      # only manages monitors it created, never reconciling siblings'.
      AUTOKUMA__TAG_NAME: autokuma-${AUTOKUMA_INSTANCE:-home}
      AUTOKUMA__DOCKER__LABEL_PREFIX: kuma
      AUTOKUMA__ON_DELETE: delete
      # Default monitor settings applied to every monitor this instance creates.
      # The "ntfy" notification provider is registered by autokuma-vps via labels
      # on the ntfy container; all instances reference it here by id.
      AUTOKUMA__DEFAULT_SETTINGS: |-
        *.notification_name_list: '["ntfy"]'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
