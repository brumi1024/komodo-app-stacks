[[stack]]
name = "ntfy"
tags = ["monitoring", "notifications"]

[stack.config]
server = "homelab-vps"
poll_for_updates = true
auto_update = true
destroy_before_deploy = false
linked_repo = "app-stacks"
file_paths = [
    "services/ntfy/docker-compose.yaml",
]

environment = """
# System configuration
TZ=[[TZ]]

# Configuration directory
CONFIG_DIR=[[CONFIG_DIR]]

# Logging configuration
LOGGING_DRIVER=[[LOGGING_DRIVER]]

# Network and domain configuration
DOMAIN=[[OP__KOMODO__COMMON__DOMAIN]]

# Port configuration
PORT_NTFY_HTTP=[[PORT_NTFY_HTTP]]

# AutoKuma → Uptime Kuma → Ntfy credentials. Embedded in container labels
# so autokuma-vps can register the notification provider in Uptime Kuma.
NTFY_NOTIFY_USERNAME=[[OP__KOMODO__ALERTER__NTFY_USERNAME]]
NTFY_NOTIFY_PASSWORD=[[OP__KOMODO__ALERTER__NTFY_PASSWORD]]
"""
