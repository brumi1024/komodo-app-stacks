name: "ntfy"

services:
  ntfy:
    image: binwiederhier/ntfy:v2
    container_name: ntfy
    command: serve
    restart: unless-stopped
    logging:
      driver: ${LOGGING_DRIVER:-local}
    ports:
      - ${PORT_NTFY_HTTP:-8088}:80
    volumes:
      - ${CONFIG_DIR}/ntfy/cache:/var/cache/ntfy
      - ${CONFIG_DIR}/ntfy/etc:/etc/ntfy
    environment:
      TZ: ${TZ}
      NTFY_BASE_URL: https://ntfy.${DOMAIN}
      NTFY_LISTEN_HTTP: ":80"
      NTFY_BEHIND_PROXY: "true"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_CACHE_DURATION: "720h"
      NTFY_ATTACHMENT_CACHE_DIR: /var/cache/ntfy/attachments
      NTFY_AUTH_FILE: /var/cache/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_ENABLE_SIGNUP: "false"
      NTFY_ENABLE_LOGIN: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/v1/health | grep -Eo '\"healthy\"\\s*:\\s*true'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - homepage.group=Monitoring
      - homepage.name=Ntfy
      - homepage.icon=ntfy.svg
      - homepage.href=https://ntfy.${DOMAIN}
      - homepage.description=Push notifications
      # AutoKuma picks these labels up (autokuma-vps shares this host) and
      # registers an "ntfy" notification provider in Uptime Kuma. Other
      # autokuma instances reference it by id via DEFAULT_SETTINGS.
      - kuma.ntfy.notification.name=Ntfy
      - kuma.ntfy.notification.active=true
      - 'kuma.ntfy.notification.config={"type":"ntfy","serverUrl":"https://ntfy.${DOMAIN}","ntfyTopic":"homelab-alerts","ntfyAuthenticationMethod":"usernameAndPassword","ntfyUsername":"${NTFY_NOTIFY_USERNAME}","ntfyPassword":"${NTFY_NOTIFY_PASSWORD}","ntfyPriority":4}'
