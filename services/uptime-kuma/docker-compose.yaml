name: "uptime-kuma"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    volumes:
      - ${CONFIG_DIR}/uptime-kuma-data:/app/data
    labels:
      - homepage.group=Monitoring
      - homepage.name=Uptime Kuma
      - homepage.icon=uptime-kuma.svg
      - homepage.href=https://uptime.${DOMAIN}
      - homepage.description=Uptime monitor
      - homepage.widget.type=uptimekuma
      - homepage.widget.url=http://uptime.${DOMAIN}
      - homepage.widget.slug=services
    networks:
      - vps-ingress
    restart: unless-stopped

networks:
  vps-ingress:
    external: true
    name: vps-ingress
