[[stack]]
name = "immich"
tags = ["media", "photos"]

[stack.config]
server = "docker"
poll_for_updates = true
auto_update = true
destroy_before_deploy = false
linked_repo = "app-stacks"
run_directory = "services/immich"
file_paths = [
    "docker-compose.yaml"
]
# Wait for NFS (port 2049) on the home NAS before deploy. The 'photos' volume
# mounts NFS from the NAS at container start; deploying onto a stale/down NAS
# brings up containers against an empty path. Fails after 60s.
pre_deploy = { path = "", command = "timeout 60 bash -c 'until (echo > /dev/tcp/[[OP__KOMODO__COMMON__HOME_NAS_IP]]/2049) 2>/dev/null; do sleep 2; done'" }

environment = """
# System configuration
TZ=[[TZ]]

# Version configuration
IMMICH_TAG=release

# Network and domain configuration
DOMAIN=[[OP__KOMODO__COMMON__DOMAIN]]
TAILNET=[[OP__KOMODO__COMMON__TAILNET]]
PORT_IMMICH_HTTP=[[PORT_IMMICH_HTTP]]

# Database configuration
DB_DATABASE_NAME=immich
DB_USERNAME=postgres
DB_PASSWORD=[[OP__KOMODO__IMMICH__IMMICH_DB_PASSWORD]]

# API tokens
IMMICH_API_AUTH_TOKEN=[[OP__KOMODO__IMMICH__IMMICH_API_AUTH_TOKEN]]

# Storage configuration
NAS_IP=[[OP__KOMODO__COMMON__HOME_NAS_IP]]
DB_DATA_LOCATION=[[CONFIG_DIR]]/immich/postgres
"""